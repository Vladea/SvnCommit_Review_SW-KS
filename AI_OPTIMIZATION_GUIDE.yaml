# 六、构建与部署
# ============================================================================

build:
  - id: BLD-001
    severity: critical
    title: 构建脚本无前置条件校验 — npm/node 缺失时静默失败
    file: 构建发布.bat
    lines: "10-28"
    effort: small
    description: >
      脚本假设 npm/node 在 PATH 中，假设 frontend/ 目录存在。
      任一条件不满足时静默跳过或报错信息不明确。
    suggested_fix: >
      在脚本开头添加：
      where npm >nul 2>nul || (echo ERROR: npm not found & exit /b 1)
      if not exist "frontend\package.json" (echo ERROR: frontend not found & exit /b 1)
    expected_impact: "前置条件缺失时立即明确报错"

  - id: BLD-002
    severity: high
    title: npm build 失败时可能残留错误工作目录
    file: 构建发布.bat
    lines: "20-28"
    effort: small
    description: >
      cd frontend 后如果 npm run build 失败，exit 时未 cd ..，
      导致后续操作在错误目录执行。应使用 pushd/popd 确保目录恢复。
    suggested_fix: >
      使用 pushd frontend & ... & popd 替代 cd frontend & ... & cd ..
    expected_impact: "构建失败不污染工作目录"

  - id: BLD-003
    severity: medium
    title: pause 阻塞 CI/CD 管道
    file: 构建发布.bat
    lines: "26"
    effort: small
    description: >
      构建失败后 pause 等待用户按键。在 CI/CD 环境无终端交互时永久挂起。
    suggested_fix: >
      检查 NO_INTERACTIVE 或 CI 环境变量，存在时跳过 pause。
    expected_impact: "构建脚本兼容 CI/CD 环境"

  - id: BLD-004
    severity: medium
    title: 打包路径硬编码 — 无存在性校验
    file: 构建发布.bat
    lines: "34-53"
    effort: small
    description: >
      xcopy 和 copy 命令假设源路径存在。如果 frontend\out 未生成
      或 config.yaml 被删除，copy 静默跳过不报错，产出不完整的 zip。
    suggested_fix: >
      每个关键文件/目录复制前检查存在性，缺失时报错退出。
    expected_impact: "确保发布的 zip 完整性"

  - id: BLD-005
    severity: low
    title: 无构建版本号
    file: 构建发布.bat
    lines: "全文"
    effort: small
    description: >
      输出 zip 固定命名为 SVN_AI_Review_V2.0.zip，
      多次构建互相覆盖，无法追溯哪个 zip 对应哪个 git commit。
    suggested_fix: >
      zip 文件名包含 git commit hash 或日期时间戳。
    expected_impact: "版本可追溯"

