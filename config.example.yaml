timezone: Asia/Shanghai
schedule:
  entries:
  - hour: 18
    minute: 0
    enabled: true
    notify_teams: true
    notify_email: false
scan:
  max_diff_chars_per_file: 12000
  include_extensions:
  - .c
  - .h
  - .cpp
  - .hpp
  - .py
  - .asl
  - '.inf'
  - .dsc
  - .dec
  - .vfr
  - .uni
  - .xml
  - .json
  - .yaml
  - .yml
  exclude_paths:
  - third_party/
  - vendor/
  - build/
  - output/
  - docs/
  rules:
    merge_conflict: true
    todo_marker: true
    debug_print: true
    memory_safety: true
  max_files_per_commit: 50
  retry:
    max_retries: 3
    delay: 5
    backoff: 2
llm:
  default: ''
  fallback: ''
  concurrent: 3
  retry_count: 2
  retry_delay: 5
  providers:
  - id: deepseek_free
    name: DeepSeek Chat（免费）
    type: openai_compatible
    api_base: https://api.deepseek.com/v1
    api_key_ref: DEEPSEEK_API_KEY
    model: deepseek-chat
    enabled: false
    description: 国产免费模型，每日 500 万 token 额度
  - id: ollama_local
    name: Ollama 本地模型
    type: openai_compatible
    api_base: http://localhost:11434/v1
    api_key_ref: ''
    model: qwen2.5-coder:7b
    enabled: false
    description: 本地部署，完全免费，适合内网环境
  - id: openai_gpt4o
    name: OpenAI GPT-4o（付费）
    type: openai_compatible
    api_base: https://api.openai.com/v1
    api_key_ref: OPENAI_API_KEY
    model: gpt-4o
    enabled: false
    description: 最强大的通用模型，审查质量最高
skills:
- id: uefi_format_align
  name: 代码格式对齐
  level: P4
  enabled: true
  file_types: ['.c', '.h', '.asl', '.vfr']
  prompt: |
    你是 UEFI BIOS 代码审查专家。检查以下 diff 的格式问题：
    - 缩进是否统一（4 空格 / Tab 混用）
    - 大括号是否对齐
    - 是否有行尾多余空格
    只输出 JSON：{"issues":[{"line":N,"desc":"...","suggestion":"..."}]}
- id: uefi_pointer_check
  name: 指针安全检查
  level: P2
  enabled: true
  file_types: ['.c', '.h']
  prompt: |
    你是 UEFI BIOS 代码审查专家。检查以下 diff 的指针安全问题：
    - AllocatePool / AllocateZeroPool 调用后是否检查了返回 NULL
    - 指针解引用前是否有 NULL 判断
    - FreePool 后是否将指针置为 NULL
    如果 diff 上下文不足以完全判断，请在 desc 中标注"需全文件审查"。
    只输出 JSON：{"issues":[{"line":N,"desc":"...","suggestion":"..."}]}
notifications:
  teams:
    enabled: true
    webhook_url_ref: TEAMS_WEBHOOK_URL
  email:
    enabled: false
    smtp_host: ''
    smtp_port: 587
    smtp_user: ''
    smtp_password_ref: EMAIL_SMTP_PASSWORD
    from_addr: ''
    to_addrs: []
projects: []
